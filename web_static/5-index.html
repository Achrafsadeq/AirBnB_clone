<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb</title>
    <link rel="stylesheet" href="styles/5-base.css">
    <link rel="stylesheet" href="styles/5-header.css">
    <link rel="stylesheet" href="styles/5-footer.css">
    <link rel="stylesheet" href="styles/5-filters.css">
    <link rel="icon" href="./images/icon.png" type="image/png">
</head>
<body>
    <!-- Header Section -->
    <header>
        <nav>
            <h1>Airbnb</h1>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container">
        <section class="filters">
            <!-- Locations Filter -->
            <div class="locations">
                <h2>States</h2>
                <p>Delta, Niger...</p>
            </div>

            <!-- Amenities Filter -->
            <div class="amenities">
                <h2>Amenities</h2>
                <p>Electricity, Water...</p>
            </div>

            <!-- Search Button -->
            <div class="search-button">
                <button type="button" aria-label="Search for listings">Search</button>
            </div>
        </section>
    </main>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2024 Best School - Excellence in Education</p>
    </footer>
</body>
</html>
