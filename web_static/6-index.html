<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/4-common.css">
    <link rel="stylesheet" href="styles/3-header.css">
    <link rel="stylesheet" href="styles/3-footer.css">
    <link rel="stylesheet" href="styles/6-filters.css">
    <link rel="icon" href="./images/icon.png" type="image/png">
    <title>Airbnb</title>
</head>
<body>
    <!-- Header Section -->
    <header>
        <!-- You can add navigation or branding here -->
    </header>

    <!-- Main Content -->
    <main class="container">
        <section class="filters">
            <!-- Locations Filter -->
            <div class="locations">
                <h3>States</h3>
                <h4>Delta, Niger...</h4>
                <ul class="popover">
                    <li>
                        <h2>Delta:</h2>
                        <ul>
                            <li>Asaba</li>
                            <li>Agbor</li>
                        </ul>
                    </li>
                    <li>
                        <h2>Ondo:</h2>
                        <ul>
                            <li>Owo</li>
                            <li>Akure</li>
                        </ul>
                    </li>
                </ul>
            </div>

            <!-- Amenities Filter -->
            <div class="amenities">
                <h3>Amenities</h3>
                <h4>Electricity, Water...</h4>
                <ul class="popover">
                    <li>Electricity</li>
                    <li>Solar Panel</li>
                    <li>Water</li>
                    <li>Bottle Water</li>
                </ul>
            </div>

            <!-- Search Button -->
            <button>Search</button>
        </section>
    </main>

    <!-- Footer Section -->
    <footer>
        <p>Best School</p>
    </footer>
</body>
</html>
